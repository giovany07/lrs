<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ligon-Razon Solutions</title>

  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="shortcut icon" href="images/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="images/favicon.png">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <nav class="navbar">
      <div class="logo">
        <img src="images/logo.png" alt="Ligon-Razon Solutions">
      </div>

      <div class="menu-toggle" id="menuToggle">☰</div>

      <div class="nav-container" id="navContainer">
        <ul class="nav-links">
          <li><a class="active" href="index.html">Home</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="about.html">About</a></li>
          <li class="mobile-contact-item">
            <a href="contact.html" class="mobile-contact-btn">Contact us</a>
          </li>
        </ul>
      </div>

      <a href="contact.html" class="contact-btn">Contact us</a>
    </nav>
  </header>

  <!-- OVERLAY -->
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- HERO -->
  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="images/video.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content fade-up">
      <h1>Launch. Run. Scale</h1>
      <p class="description">
        Run your business with seamless, day-to-day support that takes work off your plate.
      </p>
      <a href="contact.html" class="start-btn">Schedule Consultation <span>→</span></a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <img src="images/logo.png" alt="Ligon-Razon Solutions">
      </div>

      <div class="footer-column footer-contact">
        <p>Email: <a href="mailto:info@ligonrazon.com">info@ligonrazon.com</a></p>
        <p>Phone: <a href="tel:+1234567890">+1 (234) 567-890</a></p>
      </div>

      <div class="footer-column footer-social">
        <a href="#" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="#" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="#" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
    </div>

    <p class="footer-copyright">© 2026 Ligon-Razon Solutions</p>
  </footer>

  <!-- SCRIPT -->
  <script>
    (function () {
      const header = document.getElementById("header");
      const toggle = document.getElementById("menuToggle");
      const nav = document.getElementById("navContainer");
      const overlay = document.getElementById("navOverlay");

      function closeMenu() {
        nav.classList.remove("show");
        overlay.classList.remove("show");
        document.body.style.overflow = "";
      }

      function openMenu() {
        nav.classList.add("show");
        overlay.classList.add("show");
        document.body.style.overflow = "hidden";
      }

      window.addEventListener("scroll", () => {
        if (window.scrollY > 60) {
          header.classList.add("shrink");
        } else {
          header.classList.remove("shrink");
        }
      });

      toggle.addEventListener("click", () => {
        if (nav.classList.contains("show")) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      overlay.addEventListener("click", closeMenu);

      document.querySelectorAll(".nav-links a").forEach(link => {
        link.addEventListener("click", closeMenu);
      });

      const faders = document.querySelectorAll(".fade-up");
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("appear");
          }
        });
      });

      faders.forEach(el => observer.observe(el));
    })();
  </script>

</body>
</html>
